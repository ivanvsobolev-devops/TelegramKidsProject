name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: services/backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Format
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  telegram-bot:
    name: Telegram Bot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/telegram_bot
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install
        run: npm install

      - name: Format
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  flutter:
    name: Child Flutter App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install
        working-directory: apps/child_app
        run: |
          flutter create --platforms=android --no-pub .
          flutter pub get

      - name: Format
        run: dart format --set-exit-if-changed apps/child_app

      - name: Analyze
        working-directory: apps/child_app
        run: flutter analyze

      - name: Test
        working-directory: apps/child_app
        run: flutter test

      - name: Build Android debug APK
        working-directory: apps/child_app
        run: flutter build apk --debug

  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Format
        run: terraform -chdir=infra/terraform fmt -recursive -check

      - name: Init
        run: terraform -chdir=infra/terraform/environments/dev init -backend=false

      - name: Validate
        run: terraform -chdir=infra/terraform/environments/dev validate
